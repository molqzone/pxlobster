name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-linux:
    name: Release Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libusb
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build ReleaseFast Binary
        run: zig build -Dtarget=x86_64-linux-gnu -Doptimize=ReleaseFast

      - name: Package Artifacts
        run: |
          mkdir -p dist
          install -m 755 zig-out/bin/pxlobster dist/pxlobster-linux-x86_64
          sha256sum dist/pxlobster-linux-x86_64 > dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pxlobster-linux-x86_64
            dist/SHA256SUMS.txt
          generate_release_notes: true
