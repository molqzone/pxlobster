name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x86_64
            runs_on: ubuntu-latest
            zig_target: ""
            bin_path: zig-out/bin/pxlobster
          - platform: linux
            arch: aarch64
            runs_on: ubuntu-24.04-arm
            zig_target: ""
            bin_path: zig-out/bin/pxlobster
          - platform: macos
            arch: aarch64
            runs_on: macos-14
            zig_target: ""
            bin_path: zig-out/bin/pxlobster
          - platform: windows
            arch: x86_64
            runs_on: windows-latest
            zig_target: x86_64-windows-gnu
            bin_path: zig-out/bin/pxlobster.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install libusb (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev

      - name: Install libusb (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew update
          brew install libusb

      - name: Build ReleaseFast (Native)
        if: matrix.zig_target == ''
        run: zig build -Doptimize=ReleaseFast

      - name: Build ReleaseFast (Target)
        if: matrix.zig_target != ''
        run: zig build -Dtarget=${{ matrix.zig_target }} -Doptimize=ReleaseFast

      - name: Smoke Test Windows Binary
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $probeRoot = Join-Path $env:RUNNER_TEMP "portable-smoke"
          $linkDir = Join-Path $probeRoot "links"
          New-Item -ItemType Directory -Path $linkDir -Force | Out-Null
          $realExe = (Resolve-Path "${{ matrix.bin_path }}").ProviderPath
          $linkExe = Join-Path $linkDir "pxlobster.exe"

          New-Item -ItemType HardLink -Path $linkExe -Target $realExe -Force | Out-Null
          if (-not (Test-Path $linkExe)) {
            throw "Hardlink was not created at $linkExe"
          }

          & $realExe --help | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Direct EXE --help failed with exit code $LASTEXITCODE"
          }

          & $linkExe --help | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Hard-linked EXE --help failed with exit code $LASTEXITCODE"
          }

          & $linkExe --version 2>$null
          if ($LASTEXITCODE -ne 2) {
            throw "Hard-linked EXE --version expected exit code 2, got $LASTEXITCODE"
          }

      - name: Package Artifacts (Unix)
        if: matrix.platform != 'windows'
        run: |
          mkdir -p dist
          base="pxlobster-${{ matrix.platform }}-${{ matrix.arch }}"
          cp "${{ matrix.bin_path }}" "dist/${base}"
          tar -C dist -czf "dist/${base}.tar.gz" "${base}"
          python - <<'PY'
          from pathlib import Path
          import hashlib

          dist = Path("dist")
          for p in dist.glob("*.tar.gz"):
              h = hashlib.sha256(p.read_bytes()).hexdigest()
              (dist / f"{p.name}.sha256").write_text(f"{h}  {p.name}\n", encoding="utf-8")
          PY

      - name: Package Artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          $base = "pxlobster-${{ matrix.platform }}-${{ matrix.arch }}"
          Copy-Item "${{ matrix.bin_path }}" "dist/${base}.exe"
          Compress-Archive -Path "dist/${base}.exe" -DestinationPath "dist/${base}.zip" -Force
          python -c "import hashlib, pathlib; p = pathlib.Path('dist/${base}.zip'); h = hashlib.sha256(p.read_bytes()).hexdigest(); pathlib.Path('dist/${base}.zip.sha256').write_text(f'{h}  {p.name}\\n', encoding='utf-8')"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Build Combined SHA256SUMS
        run: |
          find dist -type f -name "*.sha256" -print0 | sort -z | xargs -0 cat > dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/SHA256SUMS.txt
            dist/*.tar.gz
            dist/*.zip

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Derive tag and source metadata
        id: meta
        run: |
          tag="${GITHUB_REF_NAME}"
          src_url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${tag}.tar.gz"
          curl -sSL "$src_url" -o source.tar.gz
          src_sha="$(sha256sum source.tar.gz | awk '{print $1}')"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "src_url=$src_url" >> "$GITHUB_OUTPUT"
          echo "src_sha=$src_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/molqzone/homebrew-pxlobster.git" tap

      - name: Update Formula/pxlobster.rb
        env:
          SRC_URL: ${{ steps.meta.outputs.src_url }}
          SRC_SHA: ${{ steps.meta.outputs.src_sha }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          import sys

          formula = Path("tap/Formula/pxlobster.rb")
          text = formula.read_text(encoding="utf-8")
          text_new = re.sub(r'^\s*url ".*"$', f'  url "{os.environ["SRC_URL"]}"', text, flags=re.MULTILINE)
          text_new = re.sub(r'^\s*sha256 ".*"$', f'  sha256 "{os.environ["SRC_SHA"]}"', text_new, flags=re.MULTILINE)
          if text_new == text:
              print("No formula changes detected.")
              sys.exit(0)
          formula.write_text(text_new, encoding="utf-8")
          PY

      - name: Commit and push tap update
        working-directory: tap
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git diff --quiet; then
            echo "Tap is already up-to-date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/pxlobster.rb
          git commit -m "chore(brew): bump pxlobster to ${TAG}"
          git push origin HEAD:main
