name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build And Test (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libusb
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Check Formatting
        run: zig fmt --check build.zig build.zig.zon src tests

      - name: Run Tests
        run: zig build test --summary all

      - name: Build ReleaseSafe
        run: zig build -Doptimize=ReleaseSafe

  windows-build:
    name: Build And Smoke Test (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build ReleaseSafe
        shell: pwsh
        run: zig build -Dtarget=x86_64-windows-gnu -Doptimize=ReleaseSafe

      - name: Smoke Test Portable Path
        shell: pwsh
        run: |
          $probeRoot = Join-Path $env:RUNNER_TEMP "portable-smoke"
          $linkDir = Join-Path $probeRoot "links"
          New-Item -ItemType Directory -Path $linkDir -Force | Out-Null
          $realExe = (Resolve-Path "zig-out/bin/pxlobster.exe").ProviderPath
          $linkExe = Join-Path $linkDir "pxlobster.exe"

          New-Item -ItemType HardLink -Path $linkExe -Target $realExe -Force | Out-Null
          if (-not (Test-Path $linkExe)) {
            throw "Hardlink was not created at $linkExe"
          }

          & $realExe --help | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Direct EXE --help failed with exit code $LASTEXITCODE"
          }

          & $linkExe --help | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "Hard-linked EXE --help failed with exit code $LASTEXITCODE"
          }

          & $linkExe --version 2>$null
          if ($LASTEXITCODE -ne 2) {
            throw "Hard-linked EXE --version expected exit code 2, got $LASTEXITCODE"
          }
